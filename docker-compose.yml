version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    environment:
      POSTGRES_DB: clinicdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clinic_pg_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: clinic-api
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/clinicdb
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: troqueEstaChaveSecretaPorUmaBemLongaEAleatoriaAntesDeIrParaProducao
    ports:
      - "8080:8080"

volumes:
  clinic_pg_data:
